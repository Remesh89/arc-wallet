<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arc Wallet</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#050816;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:#0f172a;
padding:30px;
border-radius:20px;
width:450px;
text-align:center;
box-shadow:0 0 20px rgba(0,255,150,0.15);
}

.balance{
font-size:36px;
font-weight:bold;
margin:20px 0;
}

button{
background:#16a34a;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
margin:5px;
}

button:hover{
opacity:0.9;
}

.wallet{
word-break:break-all;
margin-top:15px;
font-size:14px;
}

.transactions{
margin-top:25px;
text-align:left;
}

.tx{
padding:10px;
background:#1e293b;
border-radius:10px;
margin-top:8px;
}

h1{
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="card">

<h1>Arc Wallet</h1>

<p>Your Balance</p>

<div class="balance">0.00 ARC</div>

<button onclick="createWallet()">Create Wallet</button>

<div class="wallet" id="wallet"></div>

<div id="copySection"></div>

<br>

<button>Receive</button>
<button>Send</button>

<div class="transactions">

<h3>Transaction History</h3>

<div class="tx">
No transactions yet
</div>

</div>

</div>

<script>

let walletAddress="";

function createWallet(){

let chars="abcdef0123456789";

walletAddress="0x";

for(let i=0;i<40;i++){

walletAddress += chars[Math.floor(Math.random()*chars.length)];

}

document.getElementById("wallet").innerHTML=
"<b>Wallet Address:</b><br>"+walletAddress;

document.getElementById("copySection").innerHTML=
'<button onclick="copyAddress()">Copy Address</button>';

}

function copyAddress(){

navigator.clipboard.writeText(walletAddress);

alert("Wallet address copied!");

}

</script>

</body>
</html>
